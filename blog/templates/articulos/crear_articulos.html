{% extends "base.html" %}

{% block content %}
<main>
    <section class="container-fluid">
        <form method="POST" class="row m-5 d-flex justify-content-center align-content-center">

            {% csrf_token %}

            <div class="mb-4">
                <a class="btn btn-primary" href="{% url 'dashboard_html' %}">Volver</a>
            </div>

            <div class="mb-3 col-10">
                <label for="titulo" class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" id="titulo" placeholder="Escribe un título"
                    required>
            </div>

            <div class="mb-3 col-10">
                <label for="contenido" class="form-label">Contenido</label>
                <textarea name="contenido" class="form-control" id="contenido" rows="9" required></textarea>
            </div>

            <div class="mb-3 col-10 form-check ms-3">
                <input type="checkbox" name="publicado" class="form-check-input" id="publicado" checked>
                <label class="form-check-label" for="publicado">
                    Publicar inmediatamente
                </label>
            </div>

            <div class="col-10 text-center mt-3">
                <button type="submit" class="btn btn-success w-50">Grabar Post</button>
            </div>
        </form>
    </section>
</main>
{% endblock %}
